<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 TRẠM GAME GIẢI TRÍ - TRẦN BẢO NAM 🎮</title>
    <style>
        body { 
            background: #0f2027; 
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364);
            color: white; font-family: sans-serif; margin: 0; text-align: center;
        }
        h1 { margin: 30px 0; text-shadow: 0 0 10px #00ffcc; }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px; width: 95%; max-width: 1200px; margin: 0 auto 50px auto;
        }
        .game-card { background: rgba(0,0,0,0.6); padding: 15px; border-radius: 15px; border: 1px solid #00ffcc33; }
        iframe { width: 100%; height: 450px; border: none; border-radius: 10px; background: #000; }
        @media (max-width: 800px) { .game-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <h1>🎮 TRẠM GAME CỦA NAM 🎮</h1>

    <div class="game-grid">
        <div class="game-card">
            <h3>Trò Chơi 1</h3>
            <iframe src="https://html5.gamedistribution.com/a084e6ab82f9420bbe89bbe5c1b150fc/" frameborder="0" allowfullscreen></iframe>
        </div>

        <div class="game-card">
            <h3>Trò Chơi 2</h3>
            <iframe src="https://html5.gamedistribution.com/4ac9f70eac99427d9fa87c1e7e1908ef/" frameborder="0" allowfullscreen></iframe>
        </div>

        <div class="game-card">
            <h3>Trò Chơi 3</h3>
            <iframe src="https://html5.gamedistribution.com/5f0179bde2b543d5900d20792978a3a5/" frameborder="0" allowfullscreen></iframe>
        </div>

        <div class="game-card">
            <h3>Trò Chơi 4</h3>
            <iframe src="https://html5.gamedistribution.com/172e0bd0c40442dbae3d4adb42a98433/" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

</body>
</html>
